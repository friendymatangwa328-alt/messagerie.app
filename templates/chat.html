<!DOCTYPE html>
<html>
<head>
<style>
body {
    background:#1e1e2f;
    color:white;
    font-family: Arial;
}
.container {
    width: 90%;
    max-width: 500px;
    margin: auto;
}
.header {
    text-align:center;
    padding:10px;
    font-size:20px;
    font-weight:bold;
}
.chat-box {
    background:#2c2c3e;
    padding:10px;
    height:300px;
    overflow-y:auto;
    border-radius:10px;
}
.msg {
    margin:5px;
    padding:8px;
    border-radius:10px;
    max-width:70%;
}
.me {
    background:#4CAF50;
    margin-left:auto;
    text-align:right;
}
.other {
    background:#555;
    margin-right:auto;
}
form {
    margin-top:10px;
    display:flex;
}
input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}
button {
    background:#2196F3;
    color:white;
    border:none;
    padding:10px;
    margin-left:5px;
    border-radius:10px;
}
</style>
</head>
<body>
<div class="container">
<div class="header">
💬 Chat avec {{user2}}
</div>
<div class="chat-box">
{% if messages %}
    {% for m in messages %}
        <div class="msg other">
            <b>{{m[0]}}</b> : {{m[1]}}
        </div>
    {% endfor %}
{% else %}
    <p>Aucun message pour le moment...</p>
{% endif %}
</div>
<form method="post">
    <input name="msg" placeholder="Tape ton message...">
    <button>Envoyer</button>
</form>
</div>
</body>
</html>
