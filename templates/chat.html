<!DOCTYPE html>
<html>
<head>
<style>
body { display:flex; font-family:Arial; }
.users {
    width:200px;
    background:#eee;
    padding:10px;
}
.chat {
    flex:1;
    padding:10px;
}
.msg {
    background:#d1e7dd;
    margin:5px;
    padding:8px;
    border-radius:5px;
}
</style>
</head>
<body>
<div class="users">
<h3>Utilisateurs</h3>
{% for u in users %}
    <div>{{ u[0] }}</div>
{% endfor %}
</div>
<div class="chat">
<h2>Bienvenue {{ username }}</h2>
{% for m in messages %}
    <div class="msg">
        <b>{{ m[0] }}</b>: {{ m[1] }}
    </div>
{% endfor %}
<form action="/send" method="POST">
    <input name="message">
    <button>Envoyer</button>
</form>
</div>
</body>
</html>
