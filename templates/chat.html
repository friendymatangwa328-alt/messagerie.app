<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
        }
        .chat-box {
            width: 400px;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .message {
            background: #d1e7dd;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }
        input {
            width: 70%;
            padding: 10px;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
<div class="chat-box">
    <h2>Messagerie</h2>
    <div>
        {% for msg in messages %}
            <div class="message">{{ msg }}</div>
        {% endfor %}
    </div>
    <form action="/send" method="POST">
        <input type="text" name="message" placeholder="Tape ton message">
        <button type="submit">Envoyer</button>
    </form>
</div>
</body>
</html>
